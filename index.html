<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insulin Log</title>
<style>
  :root {
    --bg: #f4f6f9;
    --card: #ffffff;
    --ink: #1c2733;
    --muted: #6b7785;
    --line: #e2e8f0;
    --accent: #2563eb;
    --accent-soft: #eef4ff;
    --danger: #dc2626;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
    padding: 20px 16px 60px;
    max-width: 560px;
    margin: 0 auto;
  }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 2px; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 16px;
  }
  label { display: block; font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 6px; }
  .row { display: flex; gap: 10px; margin-bottom: 14px; }
  .row > div { flex: 1; }
  input, select {
    width: 100%;
    padding: 11px 12px;
    border: 1px solid var(--line);
    border-radius: 10px;
    font-size: 15px;
    font-family: inherit;
    background: #fff;
    color: var(--ink);
  }
  input:focus, select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: var(--accent);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  button:active { transform: scale(0.99); }
  .stats { display: flex; gap: 10px; margin-bottom: 16px; }
  .stat {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px;
    text-align: center;
  }
  .stat .num { font-size: 24px; font-weight: 700; color: var(--accent); }
  .stat .lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-top: 2px; }
  h2 { font-size: 15px; font-weight: 600; margin-bottom: 10px; }
  .entry {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid var(--line);
  }
  .entry:last-child { border-bottom: none; }
  .entry .when { font-size: 13px; color: var(--muted); }
  .entry .type { font-size: 12px; color: var(--accent); font-weight: 600; }
  .entry .dose { font-size: 17px; font-weight: 700; }
  .entry .note { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .del {
    background: none;
    color: var(--danger);
    width: auto;
    padding: 6px 10px;
    font-size: 12px;
    font-weight: 500;
  }
  .empty { color: var(--muted); font-size: 14px; text-align: center; padding: 20px 0; }
  .tools { display: flex; gap: 10px; margin-top: 8px; }
  .tools button { background: #fff; color: var(--ink); border: 1px solid var(--line); font-size: 13px; font-weight: 500; padding: 10px; }
  .disclaimer { font-size: 12px; color: var(--muted); text-align: center; margin-top: 24px; line-height: 1.6; }
</style>
</head>
<body>
  <h1>Insulin Log</h1>
  <p class="sub">Track daily insulin doses. Data saved on this device only.</p>

  <div class="card">
    <div class="row">
      <div>
        <label for="date">Date</label>
        <input type="date" id="date">
      </div>
      <div>
        <label for="time">Time</label>
        <input type="time" id="time">
      </div>
    </div>
    <div class="row">
      <div>
        <label for="type">Type</label>
        <select id="type">
          <option>Rapid (bolus)</option>
          <option>Long (basal)</option>
          <option>Mixed</option>
          <option>Other</option>
        </select>
      </div>
      <div>
        <label for="units">Units</label>
        <input type="number" id="units" min="0" step="0.5" placeholder="e.g. 12">
      </div>
    </div>
    <div class="row">
      <div>
        <label for="note">Note (optional)</label>
        <input type="text" id="note" placeholder="before lunch, BG 140...">
      </div>
    </div>
    <button onclick="addEntry()">Log dose</button>
  </div>

  <div class="stats">
    <div class="stat"><div class="num" id="todayTotal">0</div><div class="lbl">Today (units)</div></div>
    <div class="stat"><div class="num" id="todayCount">0</div><div class="lbl">Today (doses)</div></div>
    <div class="stat"><div class="num" id="avg7">0</div><div class="lbl">7-day avg/day</div></div>
  </div>

  <div class="card">
    <h2>History</h2>
    <div id="list"></div>
    <div class="tools">
      <button onclick="exportData()">Export JSON</button>
      <button onclick="clearAll()">Clear all</button>
    </div>
  </div>

  <p class="disclaimer">
    Personal log only. Not medical advice. Follow the dosing your doctor or care team gives you. Always confirm doses against your own records before injecting.
  </p>

<script>
  const KEY = 'insulin_log_v1';
  let entries = [];

  function load() {
    try {
      const raw = localStorage.getItem(KEY);
      entries = raw ? JSON.parse(raw) : [];
    } catch (e) { entries = []; }
  }

  function save() {
    localStorage.setItem(KEY, JSON.stringify(entries));
  }

  function todayStr() {
    const d = new Date();
    const off = d.getTimezoneOffset();
    return new Date(d - off * 60000).toISOString().slice(0, 10);
  }

  function nowTime() {
    const d = new Date();
    return d.toTimeString().slice(0, 5);
  }

  function addEntry() {
    const date = document.getElementById('date').value;
    const time = document.getElementById('time').value;
    const type = document.getElementById('type').value;
    const units = parseFloat(document.getElementById('units').value);
    const note = document.getElementById('note').value.trim();

    if (!date || !time || isNaN(units) || units < 0) {
      alert('Need date, time, and units.');
      return;
    }
    entries.push({ id: Date.now(), date, time, type, units, note });
    save();
    document.getElementById('units').value = '';
    document.getElementById('note').value = '';
    document.getElementById('time').value = nowTime();
    render();
  }

  function delEntry(id) {
    entries = entries.filter(e => e.id !== id);
    save();
    render();
  }

  function clearAll() {
    if (confirm('Delete ALL entries? Cannot undo.')) {
      entries = [];
      save();
      render();
    }
  }

  function exportData() {
    const blob = new Blob([JSON.stringify(entries, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'insulin_log.json';
    a.click();
    URL.revokeObjectURL(url);
  }

  function render() {
    entries.sort((a, b) => (b.date + b.time).localeCompare(a.date + a.time));
    const t = todayStr();
    const todays = entries.filter(e => e.date === t);
    const total = todays.reduce((s, e) => s + e.units, 0);
    document.getElementById('todayTotal').textContent = round(total);
    document.getElementById('todayCount').textContent = todays.length;

    const cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - 6);
    const days = {};
    entries.forEach(e => {
      if (new Date(e.date) >= cutoff) {
        days[e.date] = (days[e.date] || 0) + e.units;
      }
    });
    const dayVals = Object.values(days);
    const avg = dayVals.length ? dayVals.reduce((a, b) => a + b, 0) / dayVals.length : 0;
    document.getElementById('avg7').textContent = round(avg);

    const list = document.getElementById('list');
    if (entries.length === 0) {
      list.innerHTML = '<div class="empty">No doses logged yet.</div>';
      return;
    }
    list.innerHTML = entries.map(e => `
      <div class="entry">
        <div>
          <div class="type">${escape(e.type)}</div>
          <div class="when">${e.date} · ${e.time}</div>
          ${e.note ? `<div class="note">${escape(e.note)}</div>` : ''}
        </div>
        <div style="text-align:right; display:flex; align-items:center; gap:8px;">
          <span class="dose">${round(e.units)} u</span>
          <button class="del" onclick="delEntry(${e.id})">Delete</button>
        </div>
      </div>
    `).join('');
  }

  function round(n) { return Math.round(n * 10) / 10; }
  function escape(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  document.getElementById('date').value = todayStr();
  document.getElementById('time').value = nowTime();
  load();
  render();
</script>
</body>
</html>
